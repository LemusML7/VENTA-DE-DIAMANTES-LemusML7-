<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta de Diamantes - LemusML7</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .form-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: all 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .alert.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💎 Venta de Diamantes</h1>
            <p>LemusML7</p>
        </div>
        <div class="form-body">
            <div id="alerta" class="alert"></div>
            <form id="ventaForm">
                <div class="form-group">
                    <label>Cliente *</label>
                    <input type="text" id="cliente" required>
                </div>
                <div class="form-group">
                    <label>Teléfono *</label>
                    <input type="tel" id="telefono" required>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Diamantes *</label>
                        <input type="number" id="diamantes" required>
                    </div>
                    <div class="form-group">
                        <label>Precio L. *</label>
                        <input type="number" id="precio" step="0.01" required>
                    </div>
                <div class="form-group">
                    <label>Tipo *</label>
                    <select id="tipo" required>
                        <option value="">Seleccionar...</option>
                        <option value="ID">ID</option>
                        <option value="Recarga">Recarga</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nota</label>
                    <textarea id="nota" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="pagado" style="width: auto; margin-right: 8px;"> Pagado</label>
                </div>
                <button type="submit">Registrar Venta</button>
            </form>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxLfNGk9ZHDinCKDlMwO6rSDKEEgk3QCL9ioR-uS8fpg1VhlW-yv4V52CmEz6-krrgO/exec';
        
        document.getElementById('ventaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const now = new Date();
            const venta = {
                id: Date.now(),
                cliente: document.getElementById('cliente').value,
                telefono: document.getElementById('telefono').value,
                diamantes: parseInt(document.getElementById('diamantes').value),
                precio: parseFloat(document.getElementById('precio').value),
                tipo: document.getElementById('tipo').value,
                nota: document.getElementById('nota').value,
                fecha: now.toLocaleDateString('es-HN'),
                hora: now.toLocaleTimeString('es-HN'),
                pagado: document.getElementById('pagado').checked,
                fechaPago: document.getElementById('pagado').checked ? now.toLocaleDateString('es-HN') : ''
            };

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(venta)
            });
            
            mostrarAlerta('✅ Venta registrada exitosamente', 'success');
            document.getElementById('ventaForm').reset();
        });

        function mostrarAlerta(msg, tipo) {
            const alerta = document.getElementById('alerta');
            alerta.textContent = msg;
            alerta.className = 'alert ' + tipo;
            alerta.style.display = 'block';
            setTimeout(() => { alerta.style.display = 'none'; }, 3000);
        }
    </script>
</body>
            </html>
